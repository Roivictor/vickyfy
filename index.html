<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vickyfy | Votre musique, partout, tout le temps</title>
    
    <!-- Polices modernes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 (icônes gratuites) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Vickyfy - Écoutez et téléchargez vos musiques préférées, même hors ligne">
</head>
<body>
    <!-- Effet de particules animées -->
    <div class="particles"></div>
    
    <div class="app">
        <!-- Sidebar moderne -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-head-side-vr"></i>
                </div>
                <h1>Vicky<span>fy</span></h1>
            </div>
            
            <nav class="nav">
                <button class="nav-btn active" onclick="showHome()">
                    <i class="fas fa-home"></i>
                    <span>Accueil</span>
                    <div class="nav-indicator"></div>
                </button>
                <button class="nav-btn" onclick="showFavorites()">
                    <i class="fas fa-heart"></i>
                    <span>Favoris</span>
                    <div class="nav-indicator"></div>
                </button>
                <button class="nav-btn" onclick="showAdminPanel()">
                    <i class="fas fa-cog"></i>
                    <span>Admin</span>
                    <div class="nav-indicator"></div>
                </button>
            </nav>
            
            <div class="storage-info">
                <div class="storage-icon">
                    <i class="fas fa-microchip"></i>
                </div>
                <div class="storage-details">
                    <span class="storage-label">Stockage utilisé</span>
                    <span class="storage-value" id="storageUsed">0</span>
                    <span class="storage-unit">Mo</span>
                </div>
                <div class="storage-bar">
                    <div class="storage-progress" id="storageProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="version">Vickyfy v2.0</div>
                <div class="offline-badge">
                    <i class="fas fa-check-circle"></i> Hors ligne prêt
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main">
            <!-- Header avec bienvenue -->
            <div class="main-header">
                <div class="welcome-section">
                    <div class="welcome-text">
                        <h3>Bienvenue sur <span>Vickyfy</span></h3>
                        <p>Découvrez votre prochaine chanson préférée</p>
                    </div>
                    <div class="user-greeting">
                        <i class="fas fa-moon"></i>
                        <span id="greetingTime">Bonne soirée</span>
                    </div>
                </div>
            </div>
            
            <!-- Search bar améliorée -->
            <div class="search-section">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Que veux-tu écouter ?" 
                           onkeyup="searchSongs(this.value)">
                    <button class="search-clear" onclick="clearSearch()" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="search-filters">
                    <button class="filter-chip active" data-filter="all">Tous</button>
                    <button class="filter-chip" data-filter="recent">Récents</button>
                    <button class="filter-chip" data-filter="popular">Populaires</button>
                </div>
            </div>

            <!-- Suggestions (page d'accueil) -->
            <div id="homeSection" class="suggestions">
                <div class="section-header">
                    <div class="section-title">
                        <i class="fas fa-star"></i>
                        <h2>Suggestions pour toi</h2>
                    </div>
                    <div class="section-actions">
                        <button class="section-btn" onclick="refreshSuggestions()">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
                <div id="suggestionsList" class="songs-grid"></div>
            </div>

            <!-- Results (recherche) -->
            <div id="resultsSection" style="display:none;">
                <div class="section-header">
                    <div class="section-title">
                        <i class="fas fa-search"></i>
                        <h2>Résultats de recherche</h2>
                    </div>
                    <div class="results-count" id="resultsCount">0 chansons</div>
                </div>
                <div id="resultsList" class="songs-grid"></div>
            </div>

            <!-- Favorites -->
            <div id="favoritesSection" style="display:none;">
                <div class="section-header">
                    <div class="section-title">
                        <i class="fas fa-heart"></i>
                        <h2>Mes favoris</h2>
                    </div>
                    <div class="section-actions">
                        <button class="section-btn" onclick="clearAllFavorites()">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
                <div id="favoritesList" class="songs-grid"></div>
            </div>
        </main>

        <!-- Player bar moderne -->
        <footer class="player-bar">
            <div class="player-song-info">
                <div class="player-avatar">
                    <i class="fas fa-music"></i>
                </div>
                <div class="player-details">
                    <div id="currentTitle" class="player-title">Aucune chanson</div>
                    <div id="currentArtist" class="player-artist">Sélectionnez un titre</div>
                </div>
                <button class="player-fav" onclick="addCurrentToFavorites()">
                    <i class="far fa-heart"></i>
                </button>
            </div>
            
            <div class="player-controls-wrapper">
                <div class="player-controls">
                    <button class="control-btn" onclick="previousSong()">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button class="control-btn play-pause" id="playPauseBtn" onclick="togglePlayPause()">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="control-btn" onclick="nextSong()">
                        <i class="fas fa-step-forward"></i>
                    </button>
                </div>
                <div class="player-progress">
                    <span class="time-current" id="currentTime">0:00</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="time-total" id="totalTime">0:00</span>
                </div>
            </div>
            
            <div class="player-volume-wrapper">
                <i class="fas fa-volume-up volume-icon"></i>
                <div class="volume-bar">
                    <div class="volume-fill" id="volumeFill" style="width: 100%"></div>
                </div>
                <audio id="audioPlayer" style="display: none;"></audio>
            </div>
        </footer>
    </div>

    <!-- Overlay de chargement -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>Chargement...</p>
        </div>
    </div>

    <!-- CDN requis -->
    <script src="https://unpkg.com/dexie@3.2.3/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    
    <script>
        // Fonctions supplémentaires pour l'interface améliorée
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.querySelector('.search-clear').style.display = 'none';
            searchSongs('');
        }
        
        function refreshSuggestions() {
            showToast('🔄 Actualisation des suggestions...');
            showHome();
        }
        
        function clearAllFavorites() {
            if (confirm('⚠️ Supprimer tous les favoris ? Cette action est irréversible.')) {
                // Supprimer tous les favoris de IndexedDB
                DB.favorites.clear().then(() => {
                    favoritesSet.clear();
                    showToast('🗑 Tous les favoris ont été supprimés');
                    showFavorites();
                    updateStorageInfo();
                }).catch(() => {
                    showToast('❌ Erreur lors de la suppression');
                });
            }
        }
        
        function addCurrentToFavorites() {
            const title = document.getElementById('currentTitle').textContent;
            const artist = document.getElementById('currentArtist').textContent;
            if (title !== 'Aucune chanson' && currentSongId) {
                // Ajouter aux favoris
                toggleFavorite(currentSongId, title, artist, document.getElementById('audioPlayer').src);
            } else {
                showToast('🎵 Aucune chanson en cours');
            }
        }
        
        function togglePlayPause() {
            const audio = document.getElementById('audioPlayer');
            const btn = document.getElementById('playPauseBtn');
            if (!audio.src || audio.src === '') {
                showToast('🎵 Sélectionnez une chanson d\'abord');
                return;
            }
            if (audio.paused) {
                audio.play();
                btn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                btn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }
        
        function previousSong() {
            showToast('⏮ Chanson précédente');
        }
        
        function nextSong() {
            showToast('⏭ Chanson suivante');
        }
        
        // Mettre à jour le temps
        const audioPlayer = document.getElementById('audioPlayer');
        if (audioPlayer) {
            audioPlayer.addEventListener('timeupdate', () => {
                const current = audioPlayer.currentTime;
                const duration = audioPlayer.duration;
                if (duration && !isNaN(duration)) {
                    const percent = (current / duration) * 100;
                    const progressFill = document.getElementById('progressFill');
                    if (progressFill) progressFill.style.width = percent + '%';
                    document.getElementById('currentTime').textContent = formatTime(current);
                    document.getElementById('totalTime').textContent = formatTime(duration);
                }
            });
            
            audioPlayer.addEventListener('play', () => {
                const btn = document.getElementById('playPauseBtn');
                if (btn) btn.innerHTML = '<i class="fas fa-pause"></i>';
            });
            
            audioPlayer.addEventListener('pause', () => {
                const btn = document.getElementById('playPauseBtn');
                if (btn) btn.innerHTML = '<i class="fas fa-play"></i>';
            });
        }
        
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + (secs < 10 ? '0' + secs : secs);
        }
        
        // Message de bienvenue selon l'heure
        const hour = new Date().getHours();
        const greeting = document.getElementById('greetingTime');
        if (greeting) {
            if (hour < 12) greeting.textContent = 'Bonjour';
            else if (hour < 18) greeting.textContent = 'Bon après-midi';
            else greeting.textContent = 'Bonne soirée';
        }
        
        // Animation du scroll
        const mainElement = document.querySelector('.main');
        if (mainElement) {
            mainElement.addEventListener('scroll', () => {
                const searchSection = document.querySelector('.search-section');
                if (mainElement.scrollTop > 50) {
                    searchSection.classList.add('scrolled');
                } else {
                    searchSection.classList.remove('scrolled');
                }
            });
        }
        
        // Gestion du clear button
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.querySelector('.search-clear');
        if (searchInput && clearBtn) {
            searchInput.addEventListener('input', () => {
                if (searchInput.value.length > 0) {
                    clearBtn.style.display = 'flex';
                } else {
                    clearBtn.style.display = 'none';
                }
            });
        }
        
        // Volume control
        const volumeBar = document.querySelector('.volume-bar');
        const volumeFill = document.getElementById('volumeFill');
        const volumeIcon = document.querySelector('.volume-icon');
        
        if (volumeBar && audioPlayer) {
            volumeBar.addEventListener('click', (e) => {
                const rect = volumeBar.getBoundingClientRect();
                const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                audioPlayer.volume = percent;
                if (volumeFill) volumeFill.style.width = (percent * 100) + '%';
                
                if (audioPlayer.volume === 0) {
                    volumeIcon.className = 'fas fa-volume-mute';
                } else if (audioPlayer.volume < 0.5) {
                    volumeIcon.className = 'fas fa-volume-down';
                } else {
                    volumeIcon.className = 'fas fa-volume-up';
                }
            });
        }
        
        // Progression bar click
        const progressBar = document.querySelector('.progress-bar');
        if (progressBar && audioPlayer) {
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                if (audioPlayer.duration && !isNaN(audioPlayer.duration)) {
                    audioPlayer.currentTime = percent * audioPlayer.duration;
                }
            });
        }
    </script>
</body>
</html>
