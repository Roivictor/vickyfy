<!DOCTYPE html>
<html>
<head>
    <title>Vickyfy - Admin</title>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #121212; 
            color: white; 
            padding: 20px; 
        }
        .upload-form { 
            background: #282828; 
            padding: 20px; 
            border-radius: 10px; 
            max-width: 500px; 
            margin: 0 auto;
        }
        input, button, select { 
            padding: 10px; 
            margin: 10px 0; 
            width: 100%; 
            border-radius: 5px;
            border: none;
        }
        button { 
            background: #1DB954; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover {
            background: #0e8e3e;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }
        .success {
            background: #1DB954;
        }
        .error {
            background: #f44336;
        }
        .info {
            background: #2196F3;
        }
        h1, h2 {
            text-align: center;
        }
        #songsList {
            margin-top: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .song-item {
            background: #282828;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #f44336;
            width: auto;
            padding: 5px 15px;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>🎵 Admin Vickyfy</h1>
    <div class="upload-form">
        <h2>Upload nouvelle chanson</h2>
        <div id="message"></div>
        <input type="text" id="title" placeholder="Titre de la chanson" required>
        <input type="text" id="artist" placeholder="Nom de l'artiste" required>
        <input type="file" id="songFile" accept="audio/mpeg,audio/mp3" required>
        <button onclick="uploadSong()">📤 Upload la chanson</button>
    </div>
    <div id="songsList">
        <h2>Chansons existantes</h2>
        <div id="songs"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuration Supabase (à mettre à jour avec TES identifiants)
        const SUPABASE_URL = 'https://ocenlsrwqhroiwngxstb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jS_lqFt7korNB75ymk6Qww__3bkImZq';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function uploadSong() {
            const title = document.getElementById('title').value.trim();
            const artist = document.getElementById('artist').value.trim();
            const file = document.getElementById('songFile').files[0];
            
            if (!title || !artist || !file) {
                showMessage('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            if (!file.type.includes('mp3') && !file.type.includes('mpeg')) {
                showMessage('Veuillez sélectionner un fichier MP3', 'error');
                return;
            }
            
            showMessage('📤 Upload en cours...', 'info');
            
            // Créer un nom de fichier propre
            const cleanTitle = title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const cleanArtist = artist.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const fileName = `${cleanTitle}_${cleanArtist}_${Date.now()}.mp3`;
            
            try {
                // 1. Upload vers Supabase Storage
                const { error: uploadError } = await supabase
                    .storage
                    .from('songs')
                    .upload(fileName, file);
                
                if (uploadError) throw uploadError;
                
                // 2. Récupérer l'URL publique
                const { data: { publicUrl } } = supabase
                    .storage
                    .from('songs')
                    .getPublicUrl(fileName);
                
                // 3. Ajouter dans la base de données
                const { error: insertError } = await supabase
                    .from('songs')
                    .insert({
                        title: title,
                        artist: artist,
                        filename: fileName,
                        file_url: publicUrl,
                        plays: 0
                    });
                
                if (insertError) throw insertError;
                
                showMessage(`✅ "${title}" ajoutée avec succès !`, 'success');
                
                // Réinitialiser le formulaire
                document.getElementById('title').value = '';
                document.getElementById('artist').value = '';
                document.getElementById('songFile').value = '';
                
                // Recharger la liste
                loadSongs();
                
            } catch (error) {
                console.error('Erreur:', error);
                showMessage(`❌ Erreur: ${error.message}`, 'error');
            }
        }
        
        async function loadSongs() {
            try {
                const { data: songs, error } = await supabase
                    .from('songs')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                const songsDiv = document.getElementById('songs');
                
                if (error || !songs || songs.length === 0) {
                    songsDiv.innerHTML = '<p style="text-align:center;">Aucune chanson pour le moment</p>';
                    return;
                }
                
                songsDiv.innerHTML = songs.map(song => `
                    <div class="song-item">
                        <div>
                            <strong>${escapeHtml(song.title)}</strong> - ${escapeHtml(song.artist)}
                            <br>
                            <small style="color:#888;">${song.filename}</small>
                        </div>
                        <button class="delete-btn" onclick="deleteSong(${song.id}, '${escapeHtml(song.filename)}')">🗑 Supprimer</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading songs:', error);
                document.getElementById('songs').innerHTML = '<p style="text-align:center;">Erreur de chargement</p>';
            }
        }
        
        async function deleteSong(id, filename) {
            if (!confirm('Supprimer cette chanson ? Cette action est irréversible.')) return;
            
            try {
                // Supprimer le fichier du Storage
                if (filename) {
                    await supabase.storage.from('songs').remove([filename]);
                }
                
                // Supprimer de la base de données
                const { error: deleteError } = await supabase
                    .from('songs')
                    .delete()
                    .eq('id', id);
                
                if (deleteError) throw deleteError;
                
                showMessage('✅ Chanson supprimée', 'success');
                loadSongs();
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('❌ Erreur lors de la suppression', 'error');
            }
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${msg}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        // Charger les chansons au démarrage
        loadSongs();
    </script>
</body>
</html>
